spring.application.name=Docsense
# Multipart uploads (e.g. RAG documents)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=51MB
# AWS Secrets Manager (must match region + secret name in the console)
aws.region=ap-south-1
aws.secret.name=Docsense
# Named profile in ~/.aws/credentials (or ~/.aws/config) — ensures IDE runs use the same account as the CLI
aws.profile=ash-dev
# S3 bucket for tenant-scoped objects; keys are tenants/{tenantReferenceId}/... (no env prefix in path)
aws.s3.bucket=docsense-2026
# State machine ARN for async ingestion dispatch
aws.stepfunctions.state-machine-arn=arn:aws:states:ap-south-1:929616025104:stateMachine:DocSenseIngestion
# Application secret JSON (snake_case keys: jwt_secret, database_credentials, client_secret, elasticsearch_credentials, …)
# OpenSearch: elasticsearch_credentials in Secrets Manager sets uri only; index name and region are below.
# JWT signing key and TTL come from ApplicationSecret.jwtSecret in that same AWS secret (JSON)
# Internal API (/api/internal/**): ApplicationSecret.clientSecret — X-Client-Id and X-Client-Token (no JWT).

# DJL text embedding (default downloads all-MiniLM-L6-v2 on first use; 384-dimensional vectors)
model.url=djl://ai.djl.huggingface.pytorch/sentence-transformers/all-MiniLM-L6-v2
# Vector length for chunks; OpenSearch knn_vector mapping embedding.dimension must match.
embedding.vector.dimensions=384
# OpenSearch index for chunk embeddings (not sensitive)
opensearch.index-name=vector-store
# Vector search: top hits (max), cosine-similarity floor 0–1, k-NN neighbor pool size
opensearch.search.top-k=5
opensearch.search.min-relevance-score=0.70
opensearch.search.knn-neighbors=50

# JPA (JDBC URL / user / password come from Secrets Manager via DatabaseConfig)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
# Batch JDBC statements for saveAll / bulk operations
spring.jpa.properties.hibernate.jdbc.batch_size=32
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# HikariCP (applied in DatabaseConfig; override as needed)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Actuator health endpoint for uptime checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
