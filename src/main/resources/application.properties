spring.application.name=Docsense

# JWT (use env or secrets manager in production; HS256 needs >= 32 chars)
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-chars}
jwt.expiration-ms=86400000

# AWS Secrets Manager (must match region + secret name in the console)
aws.region=ap-south-1
aws.secret.name=Docsense
# Named profile in ~/.aws/credentials (or ~/.aws/config) — ensures IDE runs use the same account as the CLI
aws.profile=ash-dev

# JPA (JDBC URL / user / password come from Secrets Manager via DatabaseConfig)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# HikariCP (applied in DatabaseConfig; override as needed)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
