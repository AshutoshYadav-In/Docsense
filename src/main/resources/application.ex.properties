# ===========================================================================
#  Docsense — example application.properties
#  Copy this file to application.properties and fill in real values.
#  DO NOT commit application.properties with real secrets to version control.
# ===========================================================================

spring.application.name=Docsense

# ---------------------------------------------------------------------------
# Multipart uploads (RAG documents)
# ---------------------------------------------------------------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=51MB

# ---------------------------------------------------------------------------
# AWS — general
# ---------------------------------------------------------------------------
# Region where Secrets Manager, S3, OpenSearch, Step Functions, and Bedrock live
aws.region=ap-south-1
# AWS Secrets Manager secret name containing the JSON with jwt_secret, database_credentials,
# client_secret, elasticsearch_credentials, etc.
aws.secret.name=YourSecretName
# (Optional) Named profile from ~/.aws/credentials; leave blank to use default credential chain
aws.profile=

# ---------------------------------------------------------------------------
# AWS — S3
# ---------------------------------------------------------------------------
# Bucket for tenant-scoped document uploads (keys: tenants/{tenantReferenceId}/...)
aws.s3.bucket=your-s3-bucket-name

# ---------------------------------------------------------------------------
# AWS — Step Functions (async document ingestion)
# ---------------------------------------------------------------------------
aws.stepfunctions.state-machine-arn=arn:aws:states:ap-south-1:123456789012:stateMachine:YourStateMachine

# ---------------------------------------------------------------------------
# AWS — Bedrock (RAG answer generation after vector search)
# ---------------------------------------------------------------------------
# Inference profile or model id available in aws.region
aws.bedrock.model-id=anthropic.claude-3-haiku-20240307-v1:0
aws.bedrock.max-output-tokens=1024

# ---------------------------------------------------------------------------
# DJL text embedding model
# ---------------------------------------------------------------------------
# Downloads all-MiniLM-L6-v2 on first startup; produces 384-dimensional vectors
model.url=djl://ai.djl.huggingface.pytorch/sentence-transformers/all-MiniLM-L6-v2
embedding.vector.dimensions=384

# ---------------------------------------------------------------------------
# OpenSearch (vector store)
# ---------------------------------------------------------------------------
# Index name for chunk embeddings (must exist with knn_vector mapping; see opensearch/)
opensearch.index-name=vector-store
# Vector search tuning
opensearch.search.top-k=5
opensearch.search.min-relevance-score=0.50
opensearch.search.knn-neighbors=50

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
# JDBC URL, username, and password come from Secrets Manager via DatabaseConfig — not set here.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=32
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ---------------------------------------------------------------------------
# HikariCP connection pool
# ---------------------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---------------------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ===========================================================================
#  Secrets Manager JSON structure (aws.secret.name)
#  Store a JSON object like the one below in AWS Secrets Manager:
#
#  {
#    "jwt_secret": {
#      "secret": "your-base64-encoded-hs256-key-at-least-256-bits",
#      "access_token_ttl_ms": 3600000
#    },
#    "database_credentials": {
#      "url": "jdbc:postgresql://your-rds-host:5432/docsense",
#      "username": "docsense_app",
#      "password": "your-db-password"
#    },
#    "client_secret": {
#      "client_id": "internal-service",
#      "client_token": "a-long-random-token-for-internal-api"
#    },
#    "elasticsearch_credentials": {
#      "uri": "https://search-your-domain.ap-south-1.es.amazonaws.com"
#    }
#  }
# ===========================================================================
